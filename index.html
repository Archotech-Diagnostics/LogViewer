<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Archotech Log Viewer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            color: #c7cb00;
            margin: 0;
            padding: 20px;
        }
        h1, h2, h3 {
            color: #c7cb00;
            border-bottom: 1px solid #c7cb00;
            padding-bottom: 5px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .tab {
            background-color: #1a1a1a;
            color: #c7cb00;
            border: 1px solid #c7cb00;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .tab:hover, .tab.active {
            background-color: #c7cb00;
            color: #000000;
        }
        .content-area {
            background-color: #0f0f0f;
            border: 1px solid #333;
            padding: 20px;
            min-height: 400px;
            white-space: pre-wrap;
            font-family: Consolas, monospace;
            overflow-x: auto;
        }
        .hidden {
            display: none !important;
        }
        
        /* Mod List Styles */
        .mod-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        .mod-card {
            border: 1px solid #333;
            background: #111;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .mod-icon {
            width: 40px;
            height: 40px;
            background: #000;
            border: 1px solid #c7cb00;
            object-fit: cover;
            display: block;
        }
        .mod-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .mod-name {
            font-weight: bold;
            font-family: 'Segoe UI', sans-serif;
            margin-bottom: 5px;
        }
        .mod-package {
            font-size: 0.8em;
            color: #888;
        }
        .loading {
            text-align: center;
            font-size: 1.5em;
            padding: 50px;
        }
        .error {
            color: red;
            border-color: red;
        }
        a {
            color: #c7cb00;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Archotech Diagnostic System</h1>
        <p id="status-text">Loading...</p>
    </div>

    <div class="tabs" id="tabs-container" class="hidden">
        <button class="tab hidden" data-target="enhanced-log" id="btn-enhanced">Enhanced Log</button>
        <button class="tab hidden" data-target="session-log" id="btn-session">Session Log</button>
        <button class="tab hidden" data-target="trace-report" id="btn-trace">Unknown Trace</button>
        <button class="tab hidden" data-target="mod-list" id="btn-mods">Mod List</button>
        <button class="tab hidden" data-target="ai-json" id="btn-ai">AI Diagnostics</button>
        <button class="tab hidden" data-target="player-log" id="btn-player">Player.log (Local)</button>
    </div>

    <div id="enhanced-log" class="content-area hidden"></div>
    <div id="session-log" class="content-area hidden"></div>
    <div id="trace-report" class="content-area hidden"></div>
    <div id="mod-list" class="content-area hidden">
        <div class="mod-grid" id="mod-grid-container"></div>
    </div>
    <div id="ai-json" class="content-area hidden"></div>
    <div id="player-log" class="content-area hidden"></div>

    <!-- Fallback if we have local data.js -->
    <script src="data.js" onerror="window.dataJsMissing = true;"></script>
    
    <script>
        const statusText = document.getElementById('status-text');
        
        let loadedData = {
            ai_diagnostic: null,
            enhanced_log: null,
            session_log: null,
            trace_report: null,
            mod_list: null,
            player_log: null
        };

        // Tab Switching Logic
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.content-area').forEach(c => c.classList.add('hidden'));
                
                e.target.classList.add('active');
                document.getElementById(e.target.dataset.target).classList.remove('hidden');
            });
        });

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const gistId = urlParams.get('id');

            if (gistId) {
                statusText.innerText = `Fetching data from GitHub Gist: ${gistId}...`;
                try {
                    const response = await fetch(`https://api.github.com/gists/${gistId}`);
                    if (!response.ok) throw new Error('Failed to fetch Gist');
                    
                    const data = await response.json();
                    
                    if (data.files) {
                        if (data.files["AI_DIAGNOSTICS.json"]) loadedData.ai_diagnostic = data.files["AI_DIAGNOSTICS.json"].content;
                        if (data.files["ENHANCED_RAW_LOG.txt"]) loadedData.enhanced_log = data.files["ENHANCED_RAW_LOG.txt"].content;
                        if (data.files["SESSION_LOG_DUMP.txt"]) loadedData.session_log = data.files["SESSION_LOG_DUMP.txt"].content;
                        if (data.files["UNKNOWN_TRACE_REPORT.txt"]) loadedData.trace_report = data.files["UNKNOWN_TRACE_REPORT.txt"].content;
                        if (data.files["MOD_LIST.json"]) loadedData.mod_list = data.files["MOD_LIST.json"].content;
                    }
                    
                    statusText.innerText = `Online Report (ID: ${gistId})`;
                    renderData();
                } catch (err) {
                    statusText.innerHTML = `<span class="error">Error loading Gist: ${err.message}</span>`;
                }
            } else {
                if (window.archotechLocalData) {
                    statusText.innerText = `Local Offline Report (Loaded securely from data.js)`;
                    loadedData.ai_diagnostic = window.archotechLocalData["AI_DIAGNOSTICS.json"] || null;
                    loadedData.enhanced_log = window.archotechLocalData["ENHANCED_RAW_LOG.txt"] || null;
                    loadedData.session_log = window.archotechLocalData["SESSION_LOG_DUMP.txt"] || null;
                    loadedData.trace_report = window.archotechLocalData["UNKNOWN_TRACE_REPORT.txt"] || null;
                    loadedData.mod_list = window.archotechLocalData["MOD_LIST.json"] || null;
                    loadedData.player_log = window.archotechLocalData["Player.log"] || null;
                    renderData();
                } else {
                    statusText.innerText = `No ID provided in URL and no local data.js found.`;
                }
            }
        }

        function applyColors(text) {
            if (!text) return "No log data available.";
            let escaped = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            let lines = escaped.split('\n');
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                let lLower = line.toLowerCase();
                if (line.includes('[Error]') || line.includes('[Exception]') || line.includes('Exception') || lLower.startsWith('error')) {
                    lines[i] = `<span style="color: #ff5555;">${line}</span>`;
                } else if (line.includes('[Warning]') || lLower.startsWith('warning')) {
                    lines[i] = `<span style="color: #ffff55;">${line}</span>`;
                } else if (line.includes('[Message]')) {
                    lines[i] = `<span style="color: #ffffff;">${line}</span>`;
                } else if (line.includes('--- STACK TRACE ---') || line.includes('Legend:')) {
                    lines[i] = `<span style="color: #888888;">${line}</span>`;
                } else if (line.trim().startsWith('at ')) {
                    lines[i] = `<span style="color: #aaaaaa;">${line}</span>`;
                } else if (line.includes('[!]') || line.includes('[H]') || line.includes('[+]') || line.includes('[?]')) {
                    lines[i] = `<span style="color: #88ff88;">${line}</span>`;
                } else if (line.startsWith('> ')) {
                    lines[i] = `<span style="color: #cccccc;">${line}</span>`;
                }
            }
            return lines.join('\n');
        }

        function renderData() {
            let firstActive = false;
            
            function activateTab(btnId, targetId) {
                document.getElementById('tabs-container').classList.remove('hidden');
                document.getElementById(btnId).classList.remove('hidden');
                if (!firstActive) {
                    document.getElementById(btnId).classList.add('active');
                    document.getElementById(targetId).classList.remove('hidden');
                    firstActive = true;
                }
            }

            if (loadedData.enhanced_log) {
                document.getElementById('enhanced-log').innerHTML = applyColors(loadedData.enhanced_log);
                activateTab('btn-enhanced', 'enhanced-log');
            }
            if (loadedData.session_log) {
                document.getElementById('session-log').innerHTML = applyColors(loadedData.session_log);
                activateTab('btn-session', 'session-log');
            }
            if (loadedData.trace_report) {
                document.getElementById('trace-report').innerHTML = applyColors(loadedData.trace_report);
                activateTab('btn-trace', 'trace-report');
            }
            if (loadedData.player_log) {
                document.getElementById('player-log').innerHTML = applyColors(loadedData.player_log);
                activateTab('btn-player', 'player-log');
            }

            let modsSource = null;
            if (loadedData.mod_list) {
                try { modsSource = typeof loadedData.mod_list === 'string' ? JSON.parse(loadedData.mod_list) : loadedData.mod_list; } catch(e){}
            }

            if (loadedData.ai_diagnostic) {
                try {
                    let aiParsed = typeof loadedData.ai_diagnostic === 'string' ? JSON.parse(loadedData.ai_diagnostic) : loadedData.ai_diagnostic;
                    document.getElementById('ai-json').textContent = JSON.stringify(aiParsed, null, 2);
                    activateTab('btn-ai', 'ai-json');
                    if (!modsSource && aiParsed.activeMods) modsSource = aiParsed;
                } catch (e) {
                    document.getElementById('ai-json').textContent = "Error parsing AI JSON";
                    activateTab('btn-ai', 'ai-json');
                }
            }

            if (modsSource && modsSource.activeMods && Array.isArray(modsSource.activeMods)) {
                renderModList(modsSource.activeMods);
                activateTab('btn-mods', 'mod-list');
            }
            
            if (!firstActive) {
                statusText.innerText = "No logs were exported in this package.";
            }
        }

        function renderModList(mods) {
            const contentModGrid = document.getElementById('mod-grid-container');
            contentModGrid.innerHTML = '';
            
            // Build the HTML initially
            mods.forEach(mod => {
                const id = mod.steamId;
                
                const card = document.createElement('div');
                card.className = 'mod-card';
                
                let iconHtml = `<div class="mod-icon"></div>`; // blank placeholder
                let linkHtml = mod.name;

                if (mod.previewImageBase64) {
                    iconHtml = `<img class="mod-icon" src="${mod.previewImageBase64}" alt="${mod.name}" />`;
                }

                if (id && id !== "null") {
                    linkHtml = `<a href="https://steamcommunity.com/workshop/filedetails/?id=${id}" target="_blank">${mod.name}</a>`;
                    if (!mod.previewImageBase64) {
                        iconHtml = `<img class="mod-icon" data-steamid="${id}" alt="${mod.name}" />`;
                    }
                }

                card.innerHTML = `
                    ${iconHtml}
                    <div class="mod-info">
                        <div class="mod-name">[${String(mod.loadOrder).padStart(3, '0')}] ${linkHtml}</div>
                        <div class="mod-package">${mod.packageId}</div>
                    </div>
                `;
                contentModGrid.appendChild(card);
            });

            // Perform batched loading of icons
            const imgElements = document.querySelectorAll('img[data-steamid]');
            loadImagesInBatches(Array.from(imgElements), 100, 500);
        }

        function loadImagesInBatches(images, batchSize, delay) {
            let index = 0;
            
            function loadNextBatch() {
                const batch = images.slice(index, index + batchSize);
                if (batch.length === 0) return;

                batch.forEach(img => {
                    const sid = img.getAttribute('data-steamid');
                    if (sid) {
                        img.src = `https://community.cloudflare.steamstatic.com/public/images/apps/294100/${sid}.jpg`;
                    }
                });

                index += batchSize;
                setTimeout(loadNextBatch, delay);
            }

            loadNextBatch();
        }

        // Boot
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
